name: Fix Content SEO (one-time)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Add Sonin Dental Clinic + contact links
        run: node scripts/fix-content.js

      - name: Commit changes
        run: |
          git config user.name "drsonin-blog-bot"
          git config user.email "blog-bot@drsonin.com"
          git add src/content/blog/
          if git diff --staged --quiet; then
            echo "Nothing to fix."
          else
            git commit -m "fix: add Sonin Dental Clinic name and /contact/ links to all posts"
            git push
          fi
