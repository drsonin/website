name: Refresh Blog Topics

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — print new topics without saving'
        required: false
        default: 'false'

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Refresh topics
        run: node scripts/refresh-topics.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}

      - name: Commit updated topics
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "drsonin-blog-bot"
          git config user.email "blog-bot@drsonin.com"
          git add scripts/topics.js
          if git diff --staged --quiet; then
            echo "No changes to topics.js"
          else
            git commit -m "chore: refresh blog topics $(date +%Y-%m-%d)"
            git push
          fi
