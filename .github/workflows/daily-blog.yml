name: Daily Blog Post Generation

on:
  # Triggered by Zoho Catalyst Cron at 09:00 Tallinn (Europe/Tallinn timezone)
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic index (0-14). Leave empty to use today''s rotation.'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate blog posts
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            ARGS="--topic=${{ github.event.inputs.topic }}"
          fi
          node scripts/generate-post.js $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}

      - name: Commit and push generated posts
        run: |
          git config user.name "drsonin-blog-bot"
          git config user.email "blog-bot@drsonin.com"
          git add src/content/blog/ public/blog-images/
          if git diff --staged --quiet; then
            echo "No new posts generated, nothing to commit."
          else
            git commit -m "content: daily blog posts $(date +%Y-%m-%d)"
            git push
          fi
